services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fitassist
      POSTGRES_USER: fitassist
      POSTGRES_PASSWORD: devpassword
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitassist"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    profiles: ["full"]

volumes:
  pgdata-dev:
